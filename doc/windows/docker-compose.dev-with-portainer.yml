# docker-compose.dev-with-portainer.yml
# Ambiente di sviluppo OpenACS con Portainer integrato
#
# Uso:
#   docker compose -f docker-compose.dev-with-portainer.yml up -d
#
# Accesso Portainer: https://localhost:9443
# Primo accesso: crea password admin

version: '3.8'

x-default-env: &default-env
  TZ: Europe/Rome

x-db-env: &db-env
  oacs_db_user: ${db_user:-openacs}
  oacs_db_host: ${db_host:-db}
  oacs_db_port: ${db_port:-5432}
  oacs_db_passwordfile: /run/secrets/psql_password

services:

  # ------------------------------------------------------------------
  #  OpenACS instance A
  # ------------------------------------------------------------------
  openacs-a:
    image: gustafn/openacs:latest
    restart: unless-stopped
    container_name: openacs-a-dev
    
    command: >
      /bin/sh -c "
        . /scripts/container-setup-openacs.sh \\
        && /usr/local/ns/bin/nsd -i -t ${nsdconfig} -u nsadmin -g nsadmin
      "
    
    volumes:
      # Sviluppo: bind mount da host (modifica codice in real-time)
      - /var/www/oacs-a:/var/www/openacs
      - ./secrets:/run/secrets:ro      
      - ${certificatesdir:-oacs_certificates}:/var/lib/naviserver/certificates
      - /var/www/oacs-a/log:/var/www/openacs/log
      - ./config.tcl:${nsdconfig}:ro
    
    ports:
      # Esponi porta per debug
      - "8080:8080"
    
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/SYSTEM/success.tcl || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    environment:
      <<:
        - *default-env
        - *db-env
      oacs_db_name: oacs-a
      oacs_server: oacs-a
      oacs_httpport: 8080
      oacs_ipaddress: 0.0.0.0
      oacs_hostname: localhost
      oacs_serverroot: /var/www/openacs
      oacs_logdir: /var/www/openacs/log
      oacs_reverseproxymode: false  # Direct access in dev
    
    networks:
      - oacs-network
    
    labels:
      - "description=OpenACS Instance A - Development"
      - "environment=development"

  # ------------------------------------------------------------------
  #  OpenACS instance B
  # ------------------------------------------------------------------
  openacs-b:
    image: gustafn/openacs:latest
    restart: unless-stopped
    container_name: openacs-b-dev
    
    command: >
      /bin/sh -c "
        . /scripts/container-setup-openacs.sh \\
        && /usr/local/ns/bin/nsd -i -t ${nsdconfig} -u nsadmin -g nsadmin
      "
    
    volumes:
      - /var/www/oacs-b:/var/www/openacs
      - ./secrets:/run/secrets:ro      
      - ${certificatesdir:-oacs_certificates}:/var/lib/naviserver/certificates
      - /var/www/oacs-b/log:/var/www/openacs/log
      - ./config.tcl:${nsdconfig}:ro
    
    ports:
      - "8081:8080"
    
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/SYSTEM/success.tcl || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    environment:
      <<:
        - *default-env
        - *db-env
      oacs_db_name: oacs-b
      oacs_server: oacs-b
      oacs_httpport: 8080
      oacs_ipaddress: 0.0.0.0
      oacs_hostname: localhost
      oacs_serverroot: /var/www/openacs
      oacs_logdir: /var/www/openacs/log
      oacs_reverseproxymode: false
    
    networks:
      - oacs-network
    
    labels:
      - "description=OpenACS Instance B - Development"
      - "environment=development"

  # ------------------------------------------------------------------
  #  PostgreSQL Database
  # ------------------------------------------------------------------
  db:
    image: postgres:17.2
    hostname: postgres
    restart: unless-stopped
    container_name: oacs-postgres-dev
    
    environment:
      <<: *default-env
      POSTGRES_PASSWORD_FILE: /run/secrets/psql_password
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./secrets:/run/secrets:ro
      - ./init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh:ro
    
    ports:
      # Esponi su localhost per tool esterni (pgAdmin, DBeaver, etc.)
      - "127.0.0.1:5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    networks:
      - oacs-network
    
    labels:
      - "description=PostgreSQL Database - Shared"
      - "environment=development"

  # ------------------------------------------------------------------
  #  Nginx (optional in dev, utile per testare reverse proxy)
  # ------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: oacs-nginx-dev
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    
    networks:
      - oacs-network
    
    environment:
      <<: *default-env
    
    depends_on:
      openacs-a:
        condition: service_healthy
      openacs-b:
        condition: service_healthy
    
    labels:
      - "description=Nginx Reverse Proxy"
      - "environment=development"

  # ------------------------------------------------------------------
  #  Portainer - Docker Management UI
  # ------------------------------------------------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer-dev
    restart: unless-stopped
    
    ports:
      # HTTPS UI (raccomandato)
      - "9443:9443"
      # HTTP UI (opzionale, redirect a HTTPS)
      - "9000:9000"
    
    volumes:
      # Socket Docker per gestire container
      - /var/run/docker.sock:/var/run/docker.sock
      
      # Dati persistenti Portainer
      - portainer_data:/data
    
    networks:
      - oacs-network
    
    environment:
      <<: *default-env
    
    labels:
      - "description=Portainer - Docker Management UI"
      - "environment=development"
      - "access=https://localhost:9443"
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ------------------------------------------------------------------
  #  Mail Relay (Postfix) - opzionale per dev
  # ------------------------------------------------------------------
  mailrelay:
    image: boky/postfix
    container_name: oacs-mailrelay-dev
    restart: unless-stopped
    hostname: mailrelay
    
    environment:
      <<: *default-env
      HOSTNAME: mail.dev.local
      ALLOWED_SENDER_DOMAINS: localhost dev.local
      
      # In dev: log only, no real sending (opzionale)
      # RELAYHOST: 
      # RELAYHOST_USERNAME:
      # RELAYHOST_PASSWORD:
      
      MESSAGE_SIZE_LIMIT: 20971520
      LOG_LEVEL: debug
    
    ports:
      - "127.0.0.1:25:25"
    
    volumes:
      - mail_spool:/var/spool/postfix
      - mail_log:/var/log
    
    networks:
      - oacs-network
    
    labels:
      - "description=Postfix Mail Relay - Development"
      - "environment=development"

networks:
  oacs-network:
    name: oacs-network-dev
    driver: bridge

volumes:
  db_data:
    driver: local
  portainer_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  mail_spool:
    driver: local
  mail_log:
    driver: local
  oacs_certificates:
    driver: local
