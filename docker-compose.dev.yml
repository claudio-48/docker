# docker-compose.dev.yml - DEVELOPMENT OVERRIDE
#
# Override configuration for development environment
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Or: ./compose.sh dev up

services:

  # ------------------------------------------------------------------
  #  Database - Development Settings
  # ------------------------------------------------------------------
  db:
    restart: unless-stopped
    
    ports:
      - "5432:5432"  # Expose for external tools (pgAdmin, DBeaver, etc.)

  # ------------------------------------------------------------------
  #  Mail Relay - Development Settings
  # ------------------------------------------------------------------
  mailrelay:
    restart: unless-stopped

  # ------------------------------------------------------------------
  #  alter-dev - Development Settings
  # ------------------------------------------------------------------
  alter-dev:
    hostname: alter-dev
    restart: unless-stopped

    # Development: bind mount for live code editing
    volumes:
      - /var/www/alter-dev:/var/www/openacs
      - /var/www/alter-dev/log:/var/www/openacs/log
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      oacs_db_name: alter-dev
      oacs_server: alter-dev
      oacs_hostname: "alter-dev"

  # ------------------------------------------------------------------
  #  alter - Development Settings
  # ------------------------------------------------------------------
  alter:
    hostname: alter
    restart: unless-stopped

    # Development: bind mount for live code editing
    volumes:
      - alter_data_dev:/var/www/openacs
      - alter_log_dev:/var/www/openacs/log

    environment:
      oacs_db_name: alter
      oacs_server: alter
      oacs_hostname: "alter"

  # ------------------------------------------------------------------
  #  Nginx - Development Settings
  # ------------------------------------------------------------------
  nginx:
    restart: unless-stopped

    environment:
      alter_dev_server: alter-dev
      alter_server:     alter

volumes:
  alter_data_dev:
  alter_log_dev:
