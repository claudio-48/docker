# docker-compose.prod.yml - PRODUCTION OVERRIDE
#
# Override configuration for production environment
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#   Or: ./compose.sh prod up

services:

  # ------------------------------------------------------------------
  #  Database - Production Settings
  # ------------------------------------------------------------------
  db:
    restart: always
    
  # ------------------------------------------------------------------
  #  Mail Relay - Production Settings
  # ------------------------------------------------------------------
  mailrelay:
    restart: always

  # ------------------------------------------------------------------
  #  alter-dev - Production Settings
  # ------------------------------------------------------------------
  alter-dev:
    hostname: alter-dev-prod
    restart: always

    # Production: named volume + specific bind mounts
    volumes:
      - alter-dev_data_prod:/var/www/openacs
      - /var/www/alter-dev/content-repository-fattura-elettronica:/var/www/openacs/content-repository-fattura-elettronica
      - /var/www/alter-dev/content-repository-content-files:/var/www/openacs/content-repository-content-files
      - /var/www/alter-dev/log:/var/www/openacs/log
      - /var/www/alter-dev/tcl:/var/www/openacs/tcl
      - /var/www/alter-dev/www:/var/www/openacs/www


    # Production: no port exposure (only via nginx)
    # ports: []

    environment:
      oacs_db_name: alter-dev
      oacs_server: alter-dev
      oacs_hostname: "docker.alter-web.it"  # Production domain

    
  # ------------------------------------------------------------------
  #  alter - Production Settings
  # ------------------------------------------------------------------
  alter:
    hostname: alter-prod
    restart: unless-stopped

    # Staging: named volume like prod, but can switch to bind mount for testing
    volumes:
      - alter_data_prod:/var/www/openacs
      - alter_log_prod:/var/www/openacs/log

    environment:
      oacs_db_name: alter
      oacs_server: alter
      oacs_hostname: "openacs.alter-web.it"  # Production domain

  # ------------------------------------------------------------------
  #  Nginx - Production Settings
  # ------------------------------------------------------------------
  nginx:
    restart: always

    environment:
      alter_dev_server: docker.alter-web.it 
      alter_server:     openacs.alter-web.it 

volumes:
  alter-dev_data_prod:
  alter_data_prod:
  alter_log_prod: