# docker-compose.staging.yml - STAGING OVERRIDE
#
# Override configuration for staging environment
# Staging is similar to production but with some relaxed settings for testing
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up
#   Or: ./compose.sh staging up

services:

  # ------------------------------------------------------------------
  #  Database - Staging Settings
  # ------------------------------------------------------------------
  db:
    restart: unless-stopped  # Less strict than prod

  # ------------------------------------------------------------------
  #  Mail Relay - Staging Settings
  # ------------------------------------------------------------------
  mailrelay:
    restart: unless-stopped

  # ------------------------------------------------------------------
  #  alter-dev-staging - Staging Settings
  # ------------------------------------------------------------------
  alter-dev:
    hostname: alter-dev-staging
    restart: unless-stopped

    # Staging: named volume like prod
    volumes:
      - alter-dev_data_staging:/var/www/openacs
      - alter-dev_log_staging:/var/www/openacs/log

    environment:
      oacs_db_name: alter-dev
      oacs_server: alter-dev-staging
      oacs_hostname: "alter-dev-staging"

  # ------------------------------------------------------------------
  #  alter - Staging Settings
  # ------------------------------------------------------------------
  alter:
    hostname: alter-staging
    restart: unless-stopped

    # Staging: named volume like prod
    volumes:
      - alter_data_staging:/var/www/openacs
      - alter_log_staging:/var/www/openacs/log

    environment:
      oacs_db_name: alter
      oacs_server: alter-staging
      oacs_hostname: "alter-staging"  # Staging subdomain

  # ------------------------------------------------------------------
  #  Nginx - Staging Settings
  # ------------------------------------------------------------------
  nginx:
    restart: unless-stopped
    
    environment:
      alter_dev_server: alter-dev-staging
      alter_server:     alter-staging

volumes:
  alter-dev_data_staging:
  alter-dev_log_staging:
  alter_data_staging:
  alter_log_staging:
