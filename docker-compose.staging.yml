# docker-compose.staging.yml - STAGING OVERRIDE
#
# Override configuration for staging environment
# Staging is similar to production but with some relaxed settings for testing
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up
#   Or: ./compose.sh staging up

services:

  # ------------------------------------------------------------------
  #  Database - Staging Settings
  # ------------------------------------------------------------------
  db:
    restart: unless-stopped  # Less strict than prod
    
    #ports:
    #  - "127.0.0.1:5432:5432"

  # ------------------------------------------------------------------
  #  Mail Relay - Staging Settings
  # ------------------------------------------------------------------
  mailrelay:
    restart: unless-stopped

  # ------------------------------------------------------------------
  #  alter-dev-staging - Staging Settings
  # ------------------------------------------------------------------
  alter-dev:
    hostname: alter-dev-staging
    restart: unless-stopped

    # Staging: named volume like prod, but can switch to bind mount for testing
    volumes:
      - alter-dev_data_staging:/var/www/openacs
      - ./secrets:/run/secrets:ro
      - ${certificatesdir:-oacs_certificates}:/var/lib/naviserver/certificates
      - alter-dev_log_staging:/var/www/openacs/log
      - ./config.tcl:${nsdconfig}:ro
      - /var/run/docker.sock:/var/run/docker.sock

    #ports: 
    #  - "127.0.0.1:8080:8080"

    environment:
      oacs_hostname: "alter-dev-staging"  # Staging subdomain
      system_pkgs: ""

  # ------------------------------------------------------------------
  #  alter - Staging Settings
  # ------------------------------------------------------------------
  alter:
    hostname: alter-staging
    restart: unless-stopped

    # Staging: named volume like prod, but can switch to bind mount for testing
    volumes:
      - alter_data_staging:/var/www/openacs
      - ./secrets:/run/secrets:ro
      - ${certificatesdir:-oacs_certificates}:/var/lib/naviserver/certificates
      #- /var/www/alter/content-repository-fattura-elettronica:/var/www/openacs/content-repository-fattura-elettronica
      #- /var/www/alter/content-repository-content-files:/var/www/openacs/content-repository-content-files
      - alter_log_staging:/var/www/openacs/log
      - ./config.tcl:${nsdconfig}:ro
      #- /var/run/docker.sock:/var/run/docker.sock

    #ports:
    #  - "127.0.0.1:8081:8080"

    environment:
      oacs_hostname: "alter-staging"  # Staging subdomain
      system_pkgs: ""

  # ------------------------------------------------------------------
  #  Nginx - Staging Settings
  # ------------------------------------------------------------------
  nginx:
    restart: unless-stopped
    
    # Staging: different ports to avoid conflict with dev/prod
    ports: 
      - "80:80"
      - "443:443"

    environment:
      alter_dev_server: alter-dev-staging
      alter_server:     alter-staging

volumes:
  alter-dev_data_staging:
  alter-dev_log_staging:
  alter_data_staging:
  alter_log_staging:
