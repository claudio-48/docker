# deployment-clients.conf
# Configurazione multi-cliente per deployment
#
# Formato: CLIENT_ID|PROD_SERVER|PROD_USER|COMPOSE_DIR|CVSROOT|INSTANCES
#
# CLIENT_ID:    Identificativo univoco cliente (es: acme, globex)
# PROD_SERVER:  Hostname o IP server produzione
# PROD_USER:    User SSH per accesso
# COMPOSE_DIR:  Directory docker-compose in produzione
# CVSROOT:      Repository CVS (opzionale, lascia vuoto se non usi CVS)
# INSTANCES:    Istanze separate da virgola (es: oacs-a,oacs-b)
#
# Linee che iniziano con # sono commenti e vengono ignorate

# Esempio: Cliente con CVS
Oasi|docker.alter-web.it|admin|/var/www/docker|:ext:nsadmin@oasisoftware.com:/var/lib/cvs|alter-dev

# Esempio: Cliente con Git 
#Claudio|docker.alter-web.it|admin|/var/www/docker-prod||oacs-a,oacs-b

# Esempio: Cliente staging
#acme-staging|staging.acme.com|deploy|/opt/oacs-staging|:pserver:acme@cvs.internal.com:/cvsroot|oacs-a

# Template per nuovi clienti (rimuovi # per attivare)
# newclient|prod.newclient.com|deploy|/opt/oacs-production|:pserver:user@cvs.server.com:/cvsroot|oacs-a,oacs-b
